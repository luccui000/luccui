<!DOCTYPE html>
<html>
<head>
	<title>Luc Cui</title>
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
	<style>
		* { 
	margin: 0;
	padding: 0;
	font-family: 'Roboto', sans-serif;
}
@font-face {
		font-family: 'Roboto', sans-serif; 
		src: url('./SVN-Rosellinda Alyamore.otf')  format('truetype');
	}
.card { 
	width: 400px;
	height: 210px;
	text-align: center;
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	border-radius: 10px;
	box-shadow: rgba(50, 50, 93, 0.25) 0px 13px 27px -5px, rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;
} 
.card__image {
	position: relative; 
	height: 90px;
}
.card__image img {
	width: 150px;
	height: 150px;
	border-radius: 50%;
	position: absolute; 
	top: -70px;
	left: 50%;
	transform: translateX(-50%); 
	box-shadow: rgba(50, 50, 93, 0.25) 0px 13px 27px -5px, rgba(0, 0, 0, 0.3) 0px 8px 16px -8px;
}
.card__body {
	font-family: 'Verdana', sans-serif;
}
.card__body h1 {
	background-color: #808080;
	margin: 0 130px;
	color: #fff;
	border-radius: 2px; 
}
.card__body p {
	color: #5e5e5e;
	padding-top: 10px;
}
.card__footer {
	padding-top: 10px;
}
.card__footer a {
	text-decoration: none;
	color: #555;
	padding: 0 5px;
}
.card__footer a.br {
	border-right: 2px solid #ccc;
}
.card__footer a:hover {
	color: green;
	font-family: 'Roboto', sans-serif;
}
.author {
	position: absolute;
	bottom: 10px;
	left: 50%;
	color: #5e5e5e;
	font-family: 'Dancing Script', cursive, sans-serif;
	font-size: 40px;
	transform: translateX(-50%);
}
	</style>
</head>
<body>
	<div class="card"> 
		<div class="card__image">
			<img src="./user.jpeg" alt="Luc Cui">
		</div>
		<div class="card__body">
			<h1>Lực Cui</h1>		
			<p>I'm a coder</p>
		</div>
		<div class="card__footer">
			<a href="https://www.facebook.com/luccui2301/" title="" class="br">facebook</a>
			<a href="https://www.instagram.com/luccui_____/" title="" class="br">instagram</a>
			<a href="https://github.com/luccui000" title="" class="br">github</a>
			<a href="https://twitter.com/luc_cui" title="">twitter</a> 
		</div>
	</div> 
	<div class="author">@luccui</div>
</body>
</html>
